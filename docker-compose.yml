services:
  # 1. БАЗА ДАНИХ
  postgres:
    image: postgres:16
    container_name: schedule_db_container
    restart: unless-stopped
    environment:
      POSTGRES_USER: schedule_admin
      POSTGRES_PASSWORD: YULIK2005
      POSTGRES_DB: schedule_db
    volumes:
      - pg_data:/var/lib/postgresql/data
    ports:
      - "127.0.0.1:5433:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U schedule_admin -d schedule_db"]
      interval: 5s
      timeout: 5s
      retries: 5

  # 2. БЕКЕНД
  backend:
    build:
      context: ./backend
    container_name: backend_api
    restart: unless-stopped
    environment:
      - DATABASE_URL=postgresql://schedule_admin:YULIK2005@postgres:5432/schedule_db?schema=public
      - AUTH_DATABASE_URL=postgresql://schedule_admin:YULIK2005@postgres:5432/schedule_db?schema=auth
      # Прокидаємо ключ Gemini з твого хост-файлу .env
      - GEMINI_API_KEY=${GEMINI_API_KEY}
      - JWT_SECRET=${JWT_SECRET:-super_secret_jwt_key_for_development}
    command: sh -c "npx prisma migrate deploy && node dist/index.js"

    depends_on:
      postgres:
        condition: service_healthy

  # 3. ФРОНТЕНД
  frontend:
    build:
      context: ./frontend
    container_name: frontend_ui
    restart: unless-stopped
    depends_on:
      - backend

  # 4. ВЕБ-СЕРВЕР (Nginx)
  nginx:
    image: nginx:alpine
    container_name: nginx_proxy
    restart: always
    ports:
      - "80:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - frontend
      - backend

# Оголошення томів
volumes:
  pg_data:
